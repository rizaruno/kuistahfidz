<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Urut Ayat - Tahfidz Interaktif 30 Juz</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        arabic: ['Amiri', 'serif'],
                    },
                    colors: {
                        primary: '#059669', // Emerald 600
                        secondary: '#10B981', // Emerald 500
                        accent: '#F59E0B', // Amber 500
                        dark: '#064E3B', // Emerald 900
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f0fdf4;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='#10b981' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .verse-card { transition: all 0.2s ease-in-out; }
        .verse-card:active { transform: scale(0.95); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Scrollbar kustom untuk list surat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #a7f3d0; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-primary text-white shadow-md p-4 sticky top-0 z-10">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="ph-fill ph-book-open text-2xl text-accent"></i>
                <h1 class="font-bold text-lg tracking-wide">Kuis Tahfidz 30 Juz</h1>
            </div>
            <div id="quiz-header-info" class="hidden bg-dark px-3 py-1 rounded-full text-sm font-semibold flex items-center gap-2">
                <i class="ph-fill ph-star text-accent"></i>
                <span id="level-indicator">Ayat 1 / 3</span>
            </div>
            <button id="btn-back-surah" onclick="showSelectionScreen()" class="hidden bg-white text-primary px-3 py-1 rounded-full text-sm font-bold shadow hover:bg-gray-100 transition">
                <i class="ph ph-list"></i> Pilih Surat
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col p-4 max-w-2xl mx-auto w-full relative">
        
        <!-- Loading Overlay -->
        <div id="loading-screen" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm z-20 flex-col items-center justify-center rounded-2xl">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent mb-4"></div>
            <p class="text-emerald-700 font-bold animate-pulse text-lg" id="loading-text">Memuat Data API...</p>
            <p class="text-emerald-500 text-sm mt-2 text-center max-w-xs" id="loading-subtext">Mohon tunggu sebentar.</p>
        </div>

        <!-- Surah Selection Screen -->
        <div id="selection-screen" class="flex flex-col w-full h-full">
            <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-5 mb-4 text-center">
                <h2 class="text-xl font-bold text-dark mb-2">Daftar 114 Surat (30 Juz)</h2>
                <p class="text-sm text-gray-500 mb-4">Pilih surat yang ingin dimuraja'ah.</p>
                
                <!-- Search Bar -->
                <div class="relative">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="text" id="search-surah" placeholder="Cari nama surat... (Misal: Al-Baqarah)" 
                           class="w-full pl-10 pr-4 py-3 rounded-xl border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all shadow-sm">
                </div>
            </div>
            
            <div id="surah-list" class="grid grid-cols-2 md:grid-cols-3 gap-3 overflow-y-auto max-h-[60vh] pb-6 pr-1">
                <!-- List Surat Generated by JS -->
            </div>
        </div>

        <!-- Difficulty Selection Screen -->
        <div id="difficulty-screen" class="hidden flex-col w-full h-full items-center justify-center py-4">
            <div class="bg-white rounded-3xl shadow-lg border border-emerald-100 p-6 w-full max-w-md text-center max-h-[85vh] overflow-y-auto">
                <h2 class="text-2xl font-bold text-dark mb-1" id="diff-surah-title">Surat</h2>
                <p class="text-gray-500 mb-4">Pilih Tingkat Kesulitan</p>
                
                <div class="flex flex-col gap-2.5 text-left">
                    <button onclick="startQuizWithDifficulty(1)" class="w-full bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-900 p-3.5 rounded-xl transition relative overflow-hidden group">
                        <div class="font-bold text-base">Tingkat 1: Dasar</div>
                        <div class="text-xs text-emerald-600">Urutkan 1 ayat saja tanpa kata pengecoh.</div>
                    </button>
                    
                    <button onclick="startQuizWithDifficulty(2)" class="w-full bg-amber-50 hover:bg-amber-100 border border-amber-200 text-amber-900 p-3.5 rounded-xl transition relative overflow-hidden group">
                        <div class="font-bold text-base">Tingkat 2: Tantangan</div>
                        <div class="text-xs text-amber-600">Urutkan 1 ayat, awas ada <b>blok kata pengecoh</b>!</div>
                    </button>
                    
                    <button onclick="startQuizWithDifficulty(3)" class="w-full bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-900 p-3.5 rounded-xl transition relative overflow-hidden group">
                        <div class="font-bold text-base">Tingkat 3: Tadabbur Dasar</div>
                        <div class="text-xs text-blue-600">Urutkan kata Arab, lalu cocokkan arti di bawah katanya.</div>
                    </button>
                    
                    <button onclick="startQuizWithDifficulty(4)" class="w-full bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-900 p-3.5 rounded-xl transition relative overflow-hidden group">
                        <div class="font-bold text-base">Tingkat 4: Tadabbur Tantangan</div>
                        <div class="text-xs text-rose-600">Ada blok pengecoh, urutkan ayat, lalu cocokkan arti katanya.</div>
                    </button>

                    <button onclick="startQuizWithDifficulty(5)" class="w-full bg-purple-50 hover:bg-purple-100 border border-purple-200 text-purple-950 p-3.5 rounded-xl transition relative overflow-hidden group">
                        <div class="font-bold text-base">Tingkat 5: Huffadh (Gabung Ayat)</div>
                        <div class="text-xs text-purple-700"><b>1 blok bercampur!</b> Kata ayat aktif & pengecoh menyatu di satu div acak.</div>
                    </button>
                </div>
                
                <button onclick="showSelectionScreen()" class="mt-5 text-gray-500 hover:text-dark font-medium underline text-sm">Kembali</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden flex-col w-full flex-grow">
            <!-- Instruction -->
            <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-5 mb-4 text-center relative flex flex-col justify-center items-center">
                <h2 id="surah-title" class="text-2xl font-bold text-dark mb-1 font-arabic leading-normal">Judul Surat</h2>
                <div id="diff-badge" class="bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1 rounded-full mb-2">Tingkat 1</div>
                <p class="text-sm font-semibold text-emerald-700 bg-emerald-50 px-4 py-2 rounded-xl" id="quiz-instruction">Instruksi</p>
            </div>

            <!-- Answer Area -->
            <div class="mb-2 flex justify-between items-end">
                <h3 class="font-semibold text-emerald-800">Jawaban Anda:</h3>
                <button onclick="resetSelection()" class="text-xs text-red-500 hover:text-red-700 font-medium flex items-center gap-1 transition">
                    <i class="ph ph-arrow-counter-clockwise"></i> Reset
                </button>
            </div>
            
            <div id="answer-area" dir="rtl" class="bg-emerald-50 rounded-2xl border-2 border-dashed border-emerald-300 min-h-[140px] p-4 flex flex-wrap content-start gap-2 mb-6 transition-colors shadow-inner">
                <!-- Ayat yang dipilih -->
            </div>

            <!-- Option Area (Berisi 1 atau 2 Blok Div) -->
            <h3 class="font-semibold text-emerald-800 mb-2">Pilihan Kata:</h3>
            <div id="options-area" class="flex flex-col gap-3 mb-8">
                <!-- Blok acak akan di-render ke dalam sini -->
            </div>

            <!-- Action Button -->
            <div class="mt-auto pt-2 pb-8">
                <button id="check-btn" onclick="checkAnswer()" class="w-full bg-accent hover:bg-yellow-500 text-yellow-950 font-bold text-lg py-4 rounded-2xl shadow-lg transition-all transform hover:-translate-y-1 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2" disabled>
                    <i class="ph-bold ph-check-circle text-2xl"></i>
                    Periksa Jawaban
                </button>
            </div>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl transform scale-90 opacity-0 transition-all duration-300 flex flex-col items-center text-center">
            <div id="modal-icon" class="w-20 h-20 rounded-full flex items-center justify-center mb-4"></div>
            <h2 id="modal-title" class="text-2xl font-bold mb-2">Judul</h2>
            <div id="modal-message" class="text-gray-600 mb-6">Pesan modal</div>
            <button id="modal-btn" class="w-full font-bold text-lg py-3 rounded-xl transition-colors text-white">Lanjut</button>
        </div>
    </div>

    <!-- Script Utama -->
    <script>
        let allSurahsList = []; // Menyimpan daftar 114 surat dari API
        let currentSurahNumber = null;
        let currentSurahName = "";
        let currentSurahData = []; // Data ayat dari API
        let currentAyahIndex = 0;
        let currentDifficulty = 1; 
        
        let currentPhase = 'arab'; 
        let currentBlocks = []; 
        let correctOrder = []; 
        let userSelection = []; 

        // Statistik Kuis (Baru)
        let quizStartTime = null;
        let totalMistakes = 0;
        let modalTimeout = null; // Menyimpan timeout aktif modal

        // DOM Elements
        const selectionScreen = document.getElementById('selection-screen');
        const difficultyScreen = document.getElementById('difficulty-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const loadingSubtext = document.getElementById('loading-subtext');
        
        const surahListEl = document.getElementById('surah-list');
        const searchInputEl = document.getElementById('search-surah');
        const quizHeaderInfo = document.getElementById('quiz-header-info');
        const btnBackSurah = document.getElementById('btn-back-surah');
        const levelIndicatorEl = document.getElementById('level-indicator');
        const surahTitleEl = document.getElementById('surah-title');
        const diffBadgeEl = document.getElementById('diff-badge');
        const quizInstructionEl = document.getElementById('quiz-instruction');
        
        const answerAreaEl = document.getElementById('answer-area');
        const optionsAreaEl = document.getElementById('options-area');
        const checkBtnEl = document.getElementById('check-btn');

        // Modal Elements
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        const modalIcon = document.getElementById('modal-icon');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalBtn = document.getElementById('modal-btn');

        // 1. Ambil 114 Daftar Surat Saat Aplikasi Dibuka
        async function fetchAllSurahs() {
            setLoading(true, "Memuat Daftar Surat...", "Menghubungkan ke API Al-Quran");
            try {
                const response = await fetch('https://api.quran.com/api/v4/chapters?language=id');
                const data = await response.json();
                
                if(data.chapters) {
                    allSurahsList = data.chapters;
                    renderSurahList(allSurahsList);
                    showSelectionScreen();
                }
            } catch (error) {
                alert("Gagal terhubung ke API. Pastikan Anda memiliki koneksi internet.");
            } finally {
                setLoading(false);
            }
        }

        // Render List Surat (dengan fitur filter/search)
        function renderSurahList(list) {
            surahListEl.innerHTML = '';
            
            if (list.length === 0) {
                surahListEl.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">Surat tidak ditemukan.</div>';
                return;
            }

            list.forEach(surah => {
                const btn = document.createElement('button');
                btn.className = 'bg-white hover:bg-emerald-50 text-dark font-semibold py-3 px-2 rounded-xl shadow-sm border border-emerald-100 hover:border-emerald-300 transition-all active:scale-95 flex flex-col items-center justify-center gap-1';
                btn.onclick = () => showDifficultyScreen(surah.id, surah.name_simple);
                btn.innerHTML = `
                    <span class="text-xs text-emerald-500 font-bold">Surat ${surah.id}</span>
                    <span class="text-sm sm:text-base font-bold">${surah.name_simple}</span>
                    <span class="text-xs text-gray-400 font-arabic">${surah.name_arabic}</span>
                `;
                surahListEl.appendChild(btn);
            });
        }

        // Event Listener Pencarian
        searchInputEl.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredList = allSurahsList.filter(surah => 
                surah.name_simple.toLowerCase().includes(query) || 
                surah.name_arabic.includes(query) ||
                surah.id.toString() === query
            );
            renderSurahList(filteredList);
        });

        // Tampilkan/Sembunyikan Loading
        function setLoading(isShowing, title = "Memuat...", sub = "") {
            if (isShowing) {
                loadingText.textContent = title;
                loadingSubtext.textContent = sub;
                loadingScreen.classList.remove('hidden');
                loadingScreen.classList.add('flex');
            } else {
                loadingScreen.classList.add('hidden');
                loadingScreen.classList.remove('flex');
            }
        }

        function showSelectionScreen() {
            quizScreen.classList.add('hidden');
            quizScreen.classList.remove('flex');
            difficultyScreen.classList.add('hidden');
            difficultyScreen.classList.remove('flex');
            
            quizHeaderInfo.classList.add('hidden');
            btnBackSurah.classList.add('hidden');
            selectionScreen.classList.remove('hidden');
        }

        // 2. Layar Pilih Tingkat Kesulitan
        function showDifficultyScreen(number, name) {
            currentSurahNumber = number;
            currentSurahName = name;
            
            selectionScreen.classList.add('hidden');
            document.getElementById('diff-surah-title').textContent = `Surat ${name}`;
            difficultyScreen.classList.remove('hidden');
            difficultyScreen.classList.add('flex');
            btnBackSurah.classList.remove('hidden');
        }

        async function startQuizWithDifficulty(difficultyLevel) {
            currentDifficulty = difficultyLevel;
            difficultyScreen.classList.add('hidden');
            difficultyScreen.classList.remove('flex');
            
            await fetchSurahVerses(currentSurahNumber);
        }

        // 3. Penarikan Ayat Berantai (Auto-Pagination)
        async function fetchSurahVerses(number) {
            setLoading(true, "Mengambil Ayat...", "Mengunduh data surat. Mohon bersabar.");
            currentSurahData = [];
            let page = 1;
            let totalPages = 1;

            try {
                do {
                    const url = `https://api.quran.com/api/v4/verses/by_chapter/${number}?language=id&words=true&word_translation_language=id&word_fields=text_uthmani&per_page=50&page=${page}`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if(data.verses) {
                        currentSurahData = currentSurahData.concat(data.verses);
                        totalPages = data.pagination.total_pages;
                        
                        if (totalPages > 1) {
                            loadingSubtext.textContent = `Mengunduh bagian ${page} dari ${totalPages}...`;
                        }
                    } else {
                        throw new Error("Data ayat tidak ditemukan.");
                    }
                    page++;
                } while (page <= totalPages);
                
                if (currentSurahData.length > 0) {
                    currentAyahIndex = 0;
                    setupQuizUI();
                }
                
            } catch (error) {
                alert("Gagal memuat ayat. Terjadi kesalahan jaringan.");
                showSelectionScreen();
            } finally {
                setLoading(false);
            }
        }

        function setupQuizUI() {
            quizScreen.classList.remove('hidden');
            quizScreen.classList.add('flex');
            quizHeaderInfo.classList.remove('hidden');
            btnBackSurah.classList.remove('hidden');
            
            surahTitleEl.textContent = `Surat ${currentSurahName}`;
            
            let badgeText = ""; let badgeClass = "";
            if (currentDifficulty === 1) { badgeText = "Tingkat 1: Dasar"; badgeClass = "bg-emerald-100 text-emerald-800"; }
            else if (currentDifficulty === 2) { badgeText = "Tingkat 2: Tantangan"; badgeClass = "bg-amber-100 text-amber-800"; }
            else if (currentDifficulty === 3) { badgeText = "Tingkat 3: Tadabbur Dasar"; badgeClass = "bg-blue-100 text-blue-800"; }
            else if (currentDifficulty === 4) { badgeText = "Tingkat 4: Tadabbur Tantangan"; badgeClass = "bg-rose-100 text-rose-800"; }
            else { badgeText = "Tingkat 5: Huffadh (Gabung Ayat)"; badgeClass = "bg-purple-150 text-purple-800 bg-purple-100"; }
            
            diffBadgeEl.textContent = badgeText;
            diffBadgeEl.className = `text-xs font-bold px-3 py-1 rounded-full mb-2 ${badgeClass}`;
            
            // Catat waktu mulai pengerjaan kuis
            quizStartTime = Date.now();
            totalMistakes = 0;

            initAyah();
        }

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initAyah() {
            currentPhase = 'arab'; 
            setupPhaseData();
        }

        function setupPhaseData() {
            const currentVerse = currentSurahData[currentAyahIndex];
            const totalAyahs = currentSurahData.length;
            
            levelIndicatorEl.textContent = `Ayat ${currentAyahIndex + 1} / ${totalAyahs}`;
            
            if (currentPhase === 'arab') {
                if (currentDifficulty === 2 || currentDifficulty === 4) {
                    quizInstructionEl.textContent = "TATA AYAT (ARAB): Pilih kata dari blok yang tepat!";
                } else if (currentDifficulty === 5) {
                    quizInstructionEl.textContent = "TATA AYAT (GABUNGAN): Pisahkan kata ayat aktif & pengecoh di bawah!";
                } else {
                    quizInstructionEl.textContent = "TATA AYAT (ARAB): Susunlah kata menjadi ayat yang benar!";
                }
                quizInstructionEl.className = "text-sm font-semibold text-emerald-700 bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-200 shadow-sm";
            } else {
                if (currentDifficulty === 4) {
                    quizInstructionEl.textContent = "TATA ARTI: Awas blok pengecoh! Isi arti di bawah setiap kata Arab.";
                } else if (currentDifficulty === 5) {
                    quizInstructionEl.textContent = "TATA ARTI (GABUNGAN): Cari arti mufrodat yang tepat pada satu blok gabungan!";
                } else {
                    quizInstructionEl.textContent = "TATA ARTI: Lengkapi terjemahan per kata di bawah huruf Arabnya!";
                }
                quizInstructionEl.className = "text-sm font-semibold text-blue-700 bg-blue-50 px-4 py-2 rounded-xl border border-blue-200 shadow-sm";
            }

            const extractWordData = (wordObj) => {
                const arabicText = wordObj.text_uthmani || 
                                   wordObj.text || 
                                   wordObj.text_madani || 
                                   wordObj.text_indopak || 
                                   wordObj.text_imlaei || 
                                   "عربي";
                return {
                    id: wordObj.id,
                    arabic: arabicText,
                    translation: wordObj.translation ? wordObj.translation.text : "(Tanpa arti)",
                };
            };

            correctOrder = currentVerse.words
                .filter(w => w.char_type_name === 'word')
                .map(extractWordData);
            
            let targetBlockWords = [...correctOrder];
            let distractorBlockWords = [];

            // Pengecoh disiapkan untuk Level 2, 4, dan 5
            if (currentDifficulty === 2 || currentDifficulty === 4 || currentDifficulty === 5) {
                let distractorIndex = currentAyahIndex < totalAyahs - 1 ? currentAyahIndex + 1 : currentAyahIndex - 1;
                if (distractorIndex >= 0 && distractorIndex !== currentAyahIndex) {
                    const distractorVerse = currentSurahData[distractorIndex];
                    distractorBlockWords = distractorVerse.words
                        .filter(w => w.char_type_name === 'word')
                        .map(extractWordData);
                }
            }
            
            targetBlockWords = shuffleArray(targetBlockWords);
            if (distractorBlockWords.length === 0 && targetBlockWords.length === correctOrder.length) {
                let attempts = 0;
                while(JSON.stringify(targetBlockWords.map(w=>w.id)) === JSON.stringify(correctOrder.map(w=>w.id)) && correctOrder.length > 1 && attempts < 5) {
                    targetBlockWords = shuffleArray(targetBlockWords);
                    attempts++;
                }
            }

            // Aturan Blok Pilihan
            if (currentDifficulty === 5) {
                // TINGKAT 5: Kata target & distractor menyatu lebur dalam SATU blok tunggal
                distractorBlockWords = shuffleArray(distractorBlockWords);
                let merged = [...targetBlockWords, ...distractorBlockWords];
                currentBlocks = [shuffleArray(merged)];
            } else if (distractorBlockWords.length > 0) {
                // TINGKAT 2 dan 4: Terpisah dalam 2 blok acak
                distractorBlockWords = shuffleArray(distractorBlockWords);
                let blocks = [targetBlockWords, distractorBlockWords];
                currentBlocks = shuffleArray(blocks); 
            } else {
                // TINGKAT 1 dan 3: Hanya 1 blok berisi kata target saja
                currentBlocks = [targetBlockWords];
            }

            if (currentPhase === 'arti') {
                userSelection = new Array(correctOrder.length).fill(null);
            } else {
                userSelection = [];
            }

            render();
        }

        function createWordCard(word, isAnswerBox = false) {
            const btn = document.createElement('button');
            
            let classes = 'verse-card px-3 py-2 sm:px-4 sm:py-3 rounded-xl shadow-sm text-center flex flex-col items-center justify-center gap-1 transition-all group';
            
            if (isAnswerBox) {
                classes += currentPhase === 'arab' ? ' bg-primary text-white' : ' bg-blue-600 text-white';
            } else {
                classes += ' bg-white border-2 border-emerald-100 hover:border-emerald-400 text-dark hover:shadow-md';
            }

            btn.className = classes;
            
            const displayText = currentPhase === 'arab' ? word.arabic : word.translation;
            const textClass = currentPhase === 'arab' 
                ? 'text-2xl sm:text-3xl font-arabic leading-tight' 
                : 'text-sm sm:text-base font-sans font-medium leading-snug';

            const textHtml = `<span class="${textClass}">${displayText}</span>`;
            const iconBg = 'bg-red-500';
            const closeIcon = isAnswerBox ? `<i class="ph-bold ph-x text-white absolute -top-2 -right-2 ${iconBg} rounded-full p-1 text-[10px] opacity-0 group-hover:opacity-100 transition-opacity"></i>` : '';

            btn.innerHTML = `${closeIcon} ${textHtml}`;
            btn.style.position = 'relative'; 
            
            return btn;
        }

        function render() {
            const dir = 'rtl'; 
            answerAreaEl.setAttribute('dir', dir);

            optionsAreaEl.innerHTML = '';
            
            currentBlocks.forEach((block) => {
                const blockContainer = document.createElement('div');
                blockContainer.className = 'w-full bg-emerald-100/50 p-4 rounded-2xl border-2 border-emerald-200 border-dashed flex flex-wrap justify-center gap-2 relative';
                
                blockContainer.setAttribute('dir', currentPhase === 'arab' ? 'rtl' : 'ltr');
                
                let hasVisibleWord = false;

                block.forEach(word => {
                    const isSelected = currentPhase === 'arti' 
                        ? userSelection.some(u => u && u.id === word.id) 
                        : userSelection.some(u => u.id === word.id);

                    if (!isSelected) {
                        const btn = createWordCard(word, false);
                        btn.onclick = () => selectVerse(word);
                        btn.classList.add('animate-fade-in');
                        blockContainer.appendChild(btn);
                        hasVisibleWord = true;
                    }
                });

                if (!hasVisibleWord) {
                    blockContainer.innerHTML = `<span class="text-sm text-emerald-500 font-medium py-2">Semua kata di blok ini telah diambil</span>`;
                }

                optionsAreaEl.appendChild(blockContainer);
            });

            answerAreaEl.innerHTML = '';
            
            if (currentPhase === 'arab') {
                if(userSelection.length === 0) {
                    answerAreaEl.innerHTML = `<div class="w-full text-center py-6 text-sm flex flex-col items-center gap-2 text-emerald-400"><i class="ph ph-hand-tap text-3xl"></i><span>Klik kata di bawah untuk menyusun ke sini</span></div>`;
                } else {
                    userSelection.forEach((word) => {
                        const btn = createWordCard(word, true);
                        btn.onclick = () => deselectVerse(word);
                        btn.classList.add('animate-fade-in');
                        answerAreaEl.appendChild(btn);
                    });
                }
            } else {
                correctOrder.forEach((targetWord, index) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'flex flex-col items-center justify-between gap-3 bg-white p-3 rounded-xl border-2 border-emerald-100 shadow-sm flex-1 min-w-[75px] max-w-[120px]';
                    
                    const arText = document.createElement('div');
                    arText.className = 'text-2xl sm:text-3xl font-arabic text-emerald-900 text-center w-full';
                    arText.textContent = targetWord.arabic;
                    wrap.appendChild(arText);

                    const slot = document.createElement('div');
                    slot.className = 'w-full flex items-center justify-center min-h-[40px]';
                    
                    if (userSelection[index]) {
                        const selectedWord = userSelection[index];
                        const btn = document.createElement('button');
                        btn.className = 'relative w-full bg-blue-600 text-white p-2 rounded-lg text-xs sm:text-sm font-sans shadow-md group animate-fade-in text-center leading-snug cursor-pointer transition-transform active:scale-95';
                        btn.dir = 'ltr';
                        btn.innerHTML = `
                            <i class="ph-bold ph-x text-white absolute -top-2 -right-2 bg-red-500 rounded-full p-1 text-[10px] opacity-0 group-hover:opacity-100 transition-opacity"></i>
                            ${selectedWord.translation}
                        `;
                        btn.onclick = () => deselectVerse(selectedWord);
                        slot.appendChild(btn);
                    } else {
                        const emptyBox = document.createElement('div');
                        emptyBox.className = 'w-full h-8 border-2 border-dashed border-emerald-300 rounded-lg bg-emerald-50/50 flex items-center justify-center';
                        slot.appendChild(emptyBox);
                    }
                    
                    wrap.appendChild(slot);
                    answerAreaEl.appendChild(wrap);
                });
            }

            const hasSelection = currentPhase === 'arti' ? userSelection.some(w => w !== null) : userSelection.length > 0;
            checkBtnEl.disabled = !hasSelection;
            
            if(hasSelection) {
                const activeColor = currentPhase === 'arab' ? 'border-emerald-500 bg-emerald-100' : 'border-blue-400 bg-blue-50';
                answerAreaEl.className = `rounded-2xl border-2 p-4 flex flex-wrap content-start gap-3 mb-6 transition-colors shadow-inner min-h-[140px] ${activeColor}`;
            } else {
                answerAreaEl.className = `rounded-2xl border-2 border-dashed p-4 flex flex-wrap content-start gap-3 mb-6 transition-colors shadow-inner min-h-[140px] border-emerald-300 bg-emerald-50`;
            }
        }

        function selectVerse(word) {
            if (currentPhase === 'arti') {
                const firstEmptyIndex = userSelection.indexOf(null);
                if (firstEmptyIndex !== -1) {
                    userSelection[firstEmptyIndex] = word;
                }
            } else {
                userSelection.push(word);
            }
            render();
        }

        function deselectVerse(word) {
            if (currentPhase === 'arti') {
                const index = userSelection.findIndex(w => w && w.id === word.id);
                if (index !== -1) userSelection[index] = null;
            } else {
                userSelection = userSelection.filter(v => v.id !== word.id);
            }
            render();
        }

        function resetSelection() {
            if (currentPhase === 'arti') {
                userSelection = new Array(correctOrder.length).fill(null);
            } else {
                userSelection = [];
            }
            render();
        }

        // Hitung waktu durasi kuis
        function getElapsedTimeMessage() {
            const ms = Date.now() - quizStartTime;
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            
            if (minutes > 0) {
                return `${minutes} menit ${seconds} detik`;
            }
            return `${seconds} detik`;
        }

        function checkAnswer() {
            // Validasi kelengkapan
            if (currentPhase === 'arti') {
                if (userSelection.includes(null)) {
                    showModal('error', 'Belum Lengkap', 'Masih ada slot arti yang kosong. Silakan isi semuanya di bawah kata Arab.', 'Perbaiki', null, true);
                    return;
                }
            } else {
                if (userSelection.length !== correctOrder.length) {
                    showModal('error', 'Belum Lengkap', `Jawaban harus terdiri dari ${correctOrder.length} kata. Anda memasukkan ${userSelection.length} kata.`, 'Perbaiki', null, true);
                    return;
                }
            }

            const isCorrect = userSelection.every((word, index) => word && word.id === correctOrder[index].id);

            if (isCorrect) {
                // Cek apakah ada fase mufrodat/arti berikutnya untuk tingkat 3, 4, 5
                const hasTranslationPhase = currentDifficulty >= 3;
                
                if (currentPhase === 'arab' && hasTranslationPhase) {
                    // Berhasil fase Arab -> Lanjut fase terjemahan (Popup auto-dismiss)
                    showModal(
                        'success',
                        'Susunan Arab Benar!',
                        'Luar biasa! Lanjut temukan arti di bawah setiap kata Arabnya.',
                        'Lanjut Susun Arti',
                        () => {
                            currentPhase = 'arti'; 
                            setupPhaseData(); 
                        },
                        true // Popup otomatis hilang sendiri
                    );
                    return; 
                }

                // Cek apakah ayat yang selesai ini adalah ayat terakhir dari surat tersebut
                const isLastAyah = currentAyahIndex === currentSurahData.length - 1;
                
                if (isLastAyah) {
                    // DI AKHIR SURAT: Tampilkan hasil statistik utuh (KUDU DIKLIK / TIDAK HILANG OTOMATIS)
                    const durasi = getElapsedTimeMessage();
                    const statsHtml = `
                        <div class="mt-4 bg-emerald-50 rounded-2xl p-4 border border-emerald-100 text-left space-y-2">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500 font-medium">Surat:</span>
                                <span class="text-dark font-bold">${currentSurahName}</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500 font-medium">Jumlah Ayat:</span>
                                <span class="text-dark font-bold">${currentSurahData.length} ayat</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500 font-medium">Total Kesalahan:</span>
                                <span class="text-red-500 font-extrabold">${totalMistakes} kali salah</span>
                            </div>
                            <div class="flex justify-between text-sm border-t border-emerald-100 pt-2">
                                <span class="text-gray-500 font-medium">Durasi Muraja'ah:</span>
                                <span class="text-primary font-extrabold">${durasi}</span>
                            </div>
                        </div>
                    `;
                    showModal(
                        'success',
                        'Masya Allah, Tuntas!',
                        statsHtml,
                        'Pilih Surat Lain',
                        () => {
                            showSelectionScreen();
                        },
                        false // TIDAK HILANG OTOMATIS
                    );
                } else {
                    // Ayat biasa berhasil diselesaikan -> otomatis lanjut ayat berikutnya (Popup auto-dismiss)
                    showModal(
                        'success',
                        'Benar!',
                        'Lanjutkan hafalan ke ayat berikutnya.',
                        'Ayat Berikutnya',
                        () => {
                            currentAyahIndex++;
                            initAyah();
                        },
                        true // Popup otomatis hilang sendiri
                    );
                }
            } else {
                // Jawaban salah -> Catat kesalahan dan tunjukkan popup salah (Popup auto-dismiss)
                totalMistakes++;
                showModal(
                    'error',
                    'Belum Tepat',
                    'Ada urutan kata yang kurang tepat. Coba periksa kembali!',
                    'Coba Lagi',
                    null,
                    true // Popup otomatis hilang sendiri
                );
            }
        }

        // Sistem Modal Kustom dengan Fitur Auto-Dismiss
        function showModal(type, title, messageHtml, btnText, callback = null, autoDismiss = false) {
            // Bersihkan timeout modal yang sedang berjalan jika ada
            if (modalTimeout) {
                clearTimeout(modalTimeout);
                modalTimeout = null;
            }

            modalTitle.textContent = title;
            modalMessage.innerHTML = messageHtml; // Menggunakan innerHTML agar bisa merender statistik akhir
            modalBtn.textContent = btnText;

            modalIcon.className = 'w-20 h-20 rounded-full flex items-center justify-center mb-4';
            modalBtn.className = 'w-full font-bold text-lg py-3 rounded-xl transition-colors text-white shadow-md';

            if (type === 'success') {
                modalIcon.classList.add('bg-emerald-100', 'text-emerald-500');
                modalIcon.innerHTML = '<i class="ph-fill ph-check-circle text-5xl"></i>';
                modalBtn.classList.add('bg-primary', 'hover:bg-dark');
            } else if (type === 'error') {
                modalIcon.classList.add('bg-red-100', 'text-red-500');
                modalIcon.innerHTML = '<i class="ph-fill ph-x-circle text-5xl"></i>';
                modalBtn.classList.add('bg-red-500', 'hover:bg-red-600');
            }

            modalBtn.onclick = () => {
                hideModal();
                if(callback) callback();
            };

            // Jika autoDismiss diset TRUE, sembunyikan tombol dan pasang timer otomatis
            if (autoDismiss) {
                modalBtn.classList.add('hidden');
                modalTimeout = setTimeout(() => {
                    hideModal();
                    if(callback) callback();
                }, 1800); // 1.8 detik
            } else {
                modalBtn.classList.remove('hidden');
            }

            modalOverlay.classList.remove('hidden');
            modalOverlay.classList.add('flex');
            
            setTimeout(() => {
                modalContent.classList.remove('scale-90', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function hideModal() {
            if (modalTimeout) {
                clearTimeout(modalTimeout);
                modalTimeout = null;
            }
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-90', 'opacity-0');
            setTimeout(() => {
                modalOverlay.classList.add('hidden');
                modalOverlay.classList.remove('flex');
            }, 300);
        }

        // Mulai Aplikasi
        fetchAllSurahs();

    </script>
</body>
</html>
